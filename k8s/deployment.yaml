apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: honey
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: fastapi_demo:latest # 请替换为实际镜像地址，生产环境建议使用固定 tag
          args:
            - "--bind"
            - "0.0.0.0:8000"
            - "--worker-class"
            - "uvicorn_worker.UvicornWorker"
            - "--workers"
            - "1"
            - "--timeout"
            - "1800"
          ports:
            - containerPort: 8000 # 容器监听端口，与 gunicorn --bind 0.0.0.0:8000 一致
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SECRET_KEY
            - name: DEBUG
              value: "false"
          resources: # CPU/内存资源限制，requests 为调度基准，limits 为上限
            requests:
              cpu: "250m" # 0.25 核
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend # Service 自身的名称，供其他服务发现和调用
  namespace: honey
spec:
  selector:
    app: backend # 标签选择器，匹配 Deployment 中 spec.template.metadata.labels 定义的 Pod 标签，决定流量转发到哪些 Pod
  ports:
    - port: 80 # Service 对外暴露的端口
      targetPort: 8000 # Service转发到容器的 8000 端口
      nodePort: 30080 # 节点端口，外部通过 http://<节点IP>:30080 访问
  type: NodePort # 删掉上一行nodePort和这一行则不对外暴露端口 ClusterIP
