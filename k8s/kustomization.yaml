  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend
        namespace: ailink-debot
      spec:
        template:
          spec:
            containers:
              - name: backend
                volumeMounts:
                  - name: code-nfs
                    mountPath: /app/fastapi_sqlalchemy/main.py
                    subPath: main.py
            volumes:
              - name: code-nfs
                persistentVolumeClaim:
                  claimName: backend-code-pvc
